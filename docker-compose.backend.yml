services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fincouple-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fincouple
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: bun run dev

  postgres:
    image: postgres:15-alpine
    container_name: fincouple-postgres-backend
    environment:
      POSTGRES_DB: fincouple
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: